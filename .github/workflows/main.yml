name: Fetch, Convert, and Clean China Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Backup old .mrs files
        run: |
          mkdir -p .mrs-backup
          if ls *.mrs 1> /dev/null 2>&1; then
            mv *.mrs .mrs-backup/
          fi

      - name: Install Mihomo (Specific Version)
        run: |
          curl -fsSL -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.15/mihomo-linux-amd64-compatible-v1.19.15.gz
          gzip -d mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/
          mihomo version

      # --- 域名规则 (china-list) ---
      - name: Fetch latest china-list.txt (Domain)
        run: |
          curl -fsSL -o china-list.txt https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/china-list.txt
          [ -s china-list.txt ] || exit 1

      - name: Prepare YAML ruleset from Domain TXT
        run: |
          echo "payload:" > china-list.yaml
          grep -vE '^#|^$' china-list.txt | awk '{print "  - '\''" $0 "'\''"}' >> china-list.yaml

      - name: Convert Domain YAML to MRS using Mihomo
        run: mihomo convert-ruleset domain yaml china-list.yaml china-list.mrs

      # --- IP 规则 (clang.cn) ---
      - name: Fetch latest all_cn.txt (IP)
        run: |
          curl -fsSL -o all_cn.txt https://ispip.clang.cn/all_cn.txt
          [ -s all_cn.txt ] || exit 1

      - name: Prepare YAML ruleset from IP TXT
        run: |
          echo "payload:" > clangcn-ip.yaml
          grep -vE '^#|^$' all_cn.txt | awk '{print "  - '\''" $0 "'\''"}' >> clangcn-ip.yaml

      - name: Convert IP YAML to MRS using Mihomo
        run: mihomo convert-ruleset ipcidr yaml clangcn-ip.yaml clangcn-ip.mrs

      # --- 直连域名规则 (direct-list) ---
      - name: Fetch latest direct-list.txt (Domain)
        run: |
          curl -fsSL -o direct-list.txt https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/direct-list.txt
          [ -s direct-list.txt ] || exit 1

      - name: Prepare YAML ruleset from Direct Domain TXT
        run: |
          echo "payload:" > direct-list.yaml
          grep -vE '^#|^$' direct-list.txt | awk '{print "  - '\''" $0 "'\''"}' >> direct-list.yaml

      - name: Convert Direct Domain YAML to MRS using Mihomo
        run: mihomo convert-ruleset domain yaml direct-list.yaml direct-list.mrs

      # --- Cloudflare IP 规则 ---
      - name: Fetch latest cloudflare.txt (IP - Already in YAML format)
        run: |
          curl -fsSL -o cloudflare-ip.yaml https://raw.githubusercontent.com/Loyalsoldier/geoip/refs/heads/release/clash/ipcidr/cloudflare.txt
          [ -s cloudflare-ip.yaml ] || exit 1

      - name: Convert Cloudflare IP YAML to MRS using Mihomo
        run: mihomo convert-ruleset ipcidr yaml cloudflare-ip.yaml cloudflare-ip.mrs

      # --- 验证生成的文件 ---
      - name: Verify MRS files
        run: |
          for file in china-list.mrs clangcn-ip.mrs direct-list.mrs cloudflare-ip.mrs; do
            if [ ! -s "$file" ]; then
              echo "❌ Error: $file is missing or empty"
              exit 1
            fi
            SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
            echo "✓ $file generated successfully ($SIZE bytes)"
          done

      # --- 清理备份 ---
      - name: Clean up backup
        run: rm -rf .mrs-backup

      # --- 提交更改 ---
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add *.mrs
          
          if ! git diff --staged --quiet; then
            COMMIT_DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
            git commit -m "Auto-update domain and IP rules ($COMMIT_DATE CST)"
            git push
          else
            echo "No changes to commit."
          fi
