name: Fetch, Convert, and Clean China Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean up old files
        run: rm -f *.mrs *.txt *.yaml

      - name: Install Mihomo
        run: |
          set -euo pipefail
          curl -fLo mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.20/mihomo-linux-amd64-compatible-v1.19.15.gz
          gzip -d mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/
          mihomo -v

      # --- 域名规则：direct ---

      - name: Fetch latest direct rules
        run: |
          set -euo pipefail
          # clash-rules 仓库的 direct.txt 已经是合法的 payload yaml 格式，直接保存为 yaml 即可
          curl -fLo direct.yaml https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt

      - name: Convert direct YAML to MRS
        run: |
          set -euo pipefail
          mihomo convert-ruleset domain yaml direct.yaml direct.mrs

      # --- CN IP 规则 ---

      - name: Fetch CN IP lists from multiple sources
        run: |
          set -euo pipefail
          curl -fLo clang_cn.txt https://ispip.clang.cn/all_cn.txt
          curl -fLo yfgao_cn.txt https://gaoyifan.github.io/china-operator-ip/china.txt

      - name: Merge CN IP rules and prepare YAML
        run: |
          set -euo pipefail

          cat clang_cn.txt yfgao_cn.txt \
            | grep -vE '^#|^$|^//' \
            | sort -u \
            > merged_cn.txt

          echo "=== CN IP 合并统计 ==="
          echo "clang.cn 条目数:      $(grep -cvE '^#|^$' clang_cn.txt)"
          echo "yfgao.com 条目数:     $(grep -cvE '^#|^$|^//' yfgao_cn.txt)"
          echo "合并去重后条目数:     $(wc -l < merged_cn.txt)"
          echo "======================"

          echo "payload:" > cn-ip.yaml
          awk '{print "  - \047" $0 "\047"}' merged_cn.txt >> cn-ip.yaml

      - name: Convert IP YAML to MRS
        run: |
          set -euo pipefail
          mihomo convert-ruleset ipcidr yaml cn-ip.yaml cn-ip.mrs

      # --- Cloudflare IP 规则 ---

      - name: Fetch latest Cloudflare IP rules
        run: |
          set -euo pipefail
          curl -fLo cloudflare-ip.yaml https://raw.githubusercontent.com/Loyalsoldier/geoip/refs/heads/release/clash/ipcidr/cloudflare.txt

      - name: Convert Cloudflare IP YAML to MRS
        run: |
          set -euo pipefail
          mihomo convert-ruleset ipcidr yaml cloudflare-ip.yaml cloudflare-ip.mrs

      - name: List generated MRS files
        run: |
          set -euo pipefail
          ls -lh *.mrs

      - name: Clean up intermediate files
        run: rm -f *.txt *.yaml

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          shopt -s nullglob
          files=( *.mrs )

          if [ ${#files[@]} -eq 0 ]; then
            echo "没有生成任何 .mrs 文件，终止。"
            exit 1
          fi

          git add "${files[@]}"

          if ! git diff --staged --quiet; then
            git commit -m "自动更新规则集 ($(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M'))"
            git push
          else
            echo "规则集无变化，跳过提交。"
          fi
